name: aiograpi-rest

services:
  api:
    build:
      context: .
      target: runtime
    stdin_open: true
    tty: true
    ports:
      - "8000:8000"
    environment:
      AIOGRAPI_REST_DB_PATH: /data/db.json
    volumes:
      - .:/app
      - aiograpi_data:/data

  test:
    profiles:
      - test
    build:
      context: .
      target: test
    volumes:
      - .:/app
    command: pytest

volumes:
  aiograpi_data:
