name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DOCKERHUB_IMAGE: subzeroid/aiograpi-rest
  GHCR_IMAGE: ghcr.io/subzeroid/aiograpi-rest

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ github.ref_name }}
      version: ${{ steps.version.outputs.value }}
    permissions:
      contents: write
      id-token: write
      packages: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Normalize release version
      id: version
      run: |
        echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ".[test,docs]" "build>=1.3,<2"

    - name: Lint
      run: |
        ruff check .

    - name: Check generated docs
      run: |
        python scripts/generate_aiograpi_coverage.py --check

    - name: Test
      run: |
        pytest --cov=. --cov-report=term-missing --cov-fail-under=100

    - name: Build documentation
      run: |
        mkdocs build --strict

    - name: Build Python package and OpenAPI artifact
      run: |
        mkdir -p dist release
        python scripts/export_openapi.py release/openapi.json
        python -m build

    - name: Publish Python package to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

    - name: Capture build time
      id: build_time
      run: |
        echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: subzeroid
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.DOCKERHUB_IMAGE }}
          ${{ env.GHCR_IMAGE }}
        flavor: latest=false
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        target: runtime
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          GIT_SHA=${{ github.sha }}
          BUILD_TIME=${{ steps.build_time.outputs.value }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false

    - name: Publish GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          release/openapi.json
          dist/*.whl
          dist/*.tar.gz

  verify:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ needs.publish.outputs.tag }}
      VERSION: ${{ needs.publish.outputs.version }}

    steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Verify PyPI release
      run: |
        python - <<'PY'
        import json
        import os
        import time
        import urllib.request

        version = os.environ["VERSION"]
        url = "https://pypi.org/pypi/aiograpi-rest/json"
        for _ in range(30):
            with urllib.request.urlopen(url, timeout=30) as response:
                data = json.load(response)
            if version in data["releases"]:
                break
            time.sleep(10)
        else:
            raise SystemExit(f"PyPI release {version} was not found")
        PY

    - name: Verify Docker manifests
      run: |
        docker buildx imagetools inspect "$DOCKERHUB_IMAGE:$VERSION"
        docker buildx imagetools inspect "$GHCR_IMAGE:$VERSION"

    - name: Verify GitHub Release artifacts
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets,tagName > release.json
        python - <<'PY'
        import json
        import os
        from pathlib import Path

        data = json.loads(Path("release.json").read_text())
        version = os.environ["VERSION"]
        expected = {
            "openapi.json",
            f"aiograpi_rest-{version}-py3-none-any.whl",
            f"aiograpi_rest-{version}.tar.gz",
        }
        actual = {asset["name"] for asset in data["assets"]}
        missing = sorted(expected - actual)
        if missing:
            raise SystemExit(f"Missing release assets: {missing}")
        PY

    - name: Smoke test published Docker image
      run: |
        container="aiograpi-rest-release-smoke"
        docker rm -f "$container" >/dev/null 2>&1 || true
        trap 'docker rm -f "$container" >/dev/null 2>&1 || true' EXIT
        docker run --pull always -d --name "$container" -p 18080:8000 "$DOCKERHUB_IMAGE:$VERSION"
        for _ in $(seq 1 30); do
          if curl -fsS http://127.0.0.1:18080/health > health.json; then
            break
          fi
          sleep 2
        done
        python - <<'PY'
        import json
        from pathlib import Path

        if json.loads(Path("health.json").read_text()) != {"status": "ok"}:
            raise SystemExit("Unexpected /health response")
        PY
        curl -fsS http://127.0.0.1:18080/build > build.json
        python - <<'PY'
        import json
        import os
        from pathlib import Path

        build = json.loads(Path("build.json").read_text())
        if build["version"] != os.environ["VERSION"]:
            raise SystemExit(f"Unexpected /build version: {build['version']}")
        PY
